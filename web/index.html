<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DND Card Game</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <main id="app">
      <section class="topbar">
        <div>
          <h1>DND Card Game</h1>
          <p id="connection-status">Offline</p>
        </div>
        <form id="connect-form" class="connect-form">
          <label>
            Player
            <input id="player-name" name="playerName" value="Player" autocomplete="off" />
          </label>
          <label class="wide">
            Worker WS
            <input id="worker-url" name="workerUrl" autocomplete="off" />
          </label>
          <button type="submit">Connect Lobby</button>
        </form>
      </section>

      <section id="lobby-panel" class="lobby-panel" hidden>
        <div class="lobby-group">
          <h2>Public Rooms</h2>
          <div class="lobby-controls">
            <select id="public-room-select"></select>
            <button id="refresh-rooms-button" type="button">Refresh</button>
            <button id="join-public-room-button" type="button">Join</button>
          </div>
        </div>
        <div class="lobby-group">
          <h2>Join By Code</h2>
          <div class="lobby-controls">
            <input id="join-room-id" placeholder="room-code" autocomplete="off" />
            <input id="join-room-password" type="password" placeholder="password" autocomplete="off" />
            <button id="join-private-room-button" type="button">Join</button>
          </div>
        </div>
        <div class="lobby-group">
          <h2>Create Room</h2>
          <div class="lobby-controls">
            <input id="create-room-id" placeholder="main" autocomplete="off" />
            <input id="create-room-password" type="password" placeholder="empty = public" autocomplete="off" />
            <button id="create-room-button" type="button">Create</button>
          </div>
        </div>
        <p id="lobby-status" class="muted"></p>
      </section>

      <section id="character-builder" class="character-builder" hidden>
        <div class="builder-header">
          <div>
            <h2>Character</h2>
            <p id="character-summary" class="muted"></p>
            <p id="catalog-status" class="muted"></p>
          </div>
          <div class="builder-actions">
            <strong id="ability-points"></strong>
            <button id="set-character-button" type="button">Set Character</button>
          </div>
        </div>
        <div>
          <h3>Race</h3>
          <div id="race-options" class="race-options"></div>
        </div>
        <div>
          <h3>Abilities</h3>
          <div id="ability-controls" class="ability-controls"></div>
        </div>
      </section>

      <section class="table">
        <aside class="panel">
          <h2>Players</h2>
          <div id="players"></div>
        </aside>

        <section class="play-area">
          <div class="turn-strip">
            <span id="game-status">WAITING</span>
            <strong id="turn-label">Turn 0</strong>
            <span id="current-player">Current: none</span>
          </div>

          <div class="actions">
            <button id="ready-button" type="button">Ready</button>
            <button id="draw-button" type="button">Draw</button>
            <button id="end-button" type="button">End Turn</button>
          </div>

          <div id="pile-controls" class="pile-controls"></div>

          <div>
            <div class="hand-header">
              <h2>Hand</h2>
              <div id="draw-preview" class="draw-preview"></div>
            </div>
            <div id="hand" class="hand"></div>
          </div>
        </section>

        <aside class="panel">
          <h2>Log</h2>
          <ol id="event-log"></ol>
        </aside>
      </section>

      <dialog id="pile-dialog" class="pile-dialog">
        <div class="pile-dialog-header">
          <h2 id="pile-dialog-title">Pile</h2>
          <button id="pile-dialog-close" type="button">Close</button>
        </div>
        <div id="pile-dialog-body" class="pile-list"></div>
      </dialog>
    </main>
  </body>
</html>
